name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'x86_64-apple-darwin' || '' }}

      - name: Install npm dependencies
        run: npm install

      - name: Generate icons (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri/icons
          python3 -c "
          import struct, zlib
          def png(w,h,color):
              def chunk(t,d):
                  c=zlib.crc32(t+d)&0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+bytes(color)*w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('32x32.png','wb').write(png(32,32,[100,120,200]))
          open('128x128.png','wb').write(png(128,128,[100,120,200]))
          open('128x128@2x.png','wb').write(png(256,256,[100,120,200]))
          open('icon.icns','wb').write(b'')
          "

      - name: Generate icons (Windows)
        if: matrix.platform == 'windows-latest'
        shell: python
        run: |
          import struct, zlib, os
          os.chdir('src-tauri/icons')
          def png(w,h,color):
              def chunk(t,d):
                  c=zlib.crc32(t+d)&0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              raw=b''.join(b'\x00'+bytes(color)*w for _ in range(h))
              return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))+chunk(b'IDAT',zlib.compress(raw))+chunk(b'IEND',b'')
          open('32x32.png','wb').write(png(32,32,[100,120,200]))
          open('128x128.png','wb').write(png(128,128,[100,120,200]))
          open('128x128@2x.png','wb').write(png(256,256,[100,120,200]))
          # Valid 32x32 ICO using PNG format inside ICO container
          png_data = png(32,32,[100,120,200])
          ico_header = struct.pack('<HHH', 0, 1, 1)
          ico_entry = struct.pack('<BBBBHHII', 32, 32, 0, 0, 1, 32, len(png_data), 22)
          open('icon.ico','wb').write(ico_header + ico_entry + png_data)
          open('icon.icns','wb').write(b'')

      - name: Build worker (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install -r worker/requirements.txt --quiet
          cd worker
          pyinstaller worker.py --onefile --name worker \
            --distpath ../src-tauri/binaries \
            --workpath /tmp/pyinstaller-work \
            --specpath /tmp/pyinstaller-spec \
            --clean --noconfirm
          mv ../src-tauri/binaries/worker ../src-tauri/binaries/worker-x86_64-apple-darwin
          cp ../src-tauri/binaries/worker-x86_64-apple-darwin ../src-tauri/binaries/worker-aarch64-apple-darwin

      - name: Build worker (Windows)
        if: matrix.platform == 'windows-latest'
        shell: cmd
        run: |
          pip install -r worker/requirements.txt --quiet
          cd worker
          pyinstaller worker.py --onefile --name worker --distpath ..\src-tauri\binaries --workpath %CD%\pyinstaller-work --specpath %CD%\pyinstaller-spec --clean --noconfirm
          rename ..\src-tauri\binaries\worker.exe worker-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Research Pilot ${{ github.ref_name }}"
          releaseBody: |
            ## Install
            - **Mac**: Download the `.dmg`, open it, drag Research Pilot to Applications.
            - **Windows**: Download the `.msi`, run it, follow the installer.

            On first launch you will be asked for your Serper and Anthropic API keys.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}