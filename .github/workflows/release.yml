name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Python dependencies & build worker (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          pip install -r worker/requirements.txt
          cd worker && bash build_worker.sh

      - name: Install Python dependencies & build worker (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          pip install -r worker/requirements.txt
          cd worker && build_worker.bat
        shell: cmd

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Research Pilot ${{ github.ref_name }}"
          releaseBody: |
            ## Install
            - **Mac**: Download the `.dmg`, open it, drag Research Pilot to Applications.
            - **Windows**: Download the `.msi`, run it, follow the installer.

            On first launch you will be asked for your Serper and Anthropic API keys.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
